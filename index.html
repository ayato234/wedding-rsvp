  <script>
    // Create falling autumn leaves
    const leaves = ['🍂', '🍁', '🍃'];
    function createLeaf() {
      const leaf = document.createElement('div');
      leaf.textContent = leaves[Math.floor(Math.random() * leaves.length)];
      leaf.className = 'leaf';
      leaf.style.left = Math.random() * 100 + '%';
      leaf.style.top = '-100px';
      const duration = 8 + Math.random() * 4;
      const direction = Math.random() > 0.5 ? 'cw' : 'ccw';
      leaf.style.animation = `fall-${direction} ${duration}s linear forwards`;
      document.getElementById('app').appendChild(leaf);
      setTimeout(() => leaf.remove(), duration * 1000);
    }
    setInterval(createLeaf, 1500);

    // Language translations for form labels and inputs
    const formTranslations = {
      jp: {
        attendanceLabel: 'ご出欠',
        attendanceYes: 'ご出席',
        attendanceNo: 'ご欠席',
        nameLabel: 'お名前',
        emailLabel: 'メールアドレス',
        phoneLabel: 'お電話番号',
        postalLabel: '郵便番号',
        addressLabel: 'ご住所',
        allergiesLabel: 'アレルギー',
        afterpartyLabel: 'アフターパーティー',
        afterpartyYes: 'はい',
        afterpartyNo: 'いいえ',
        messageLabel: 'メッセージ',
        submitBtn: 'RSVPを送信'
      },
      en: {
        attendanceLabel: 'Attendance',
        attendanceYes: 'Accepts with pleasure',
        attendanceNo: 'Declines with regret',
        nameLabel: 'Name',
        emailLabel: 'Email Address',
        phoneLabel: 'Phone Number',
        postalLabel: 'Postal Code',
        addressLabel: 'Address',
        allergiesLabel: 'Allergies',
        afterpartyLabel: 'After-Party',
        afterpartyYes: 'Yes',
        afterpartyNo: 'No',
        messageLabel: 'Message',
        submitBtn: 'Send RSVP'
      },
      vi: {
        attendanceLabel: 'Tham dự',
        attendanceYes: 'Rất hân hạnh được chấp nhận',
        attendanceNo: 'Từ chối với sự tiếc nuối',
        nameLabel: 'Họ và tên',
        emailLabel: 'Địa chỉ email',
        phoneLabel: 'Số điện thoại',
        postalLabel: 'Mã bưu chính',
        addressLabel: 'Địa chỉ',
        allergiesLabel: 'Dị ứng',
        afterpartyLabel: 'Tiệc hậu mãi',
        afterpartyYes: 'Có',
        afterpartyNo: 'Không',
        messageLabel: 'Lời nhắn',
        submitBtn: 'Gửi RSVP'
      }
    };

    let currentFormLang = 'en';

    function switchFormLanguage(lang) {
      currentFormLang = lang;
      document.querySelector('[data-template-id="attendance-label"]').textContent = formTranslations[lang].attendanceLabel;
      document.querySelectorAll('[data-template-id="attendance-yes"]').forEach(el => el.textContent = formTranslations[lang].attendanceYes);
      document.querySelectorAll('[data-template-id="attendance-no"]').forEach(el => el.textContent = formTranslations[lang].attendanceNo);
      document.querySelector('[data-template-id="name-label"]').textContent = formTranslations[lang].nameLabel;
      document.querySelector('[data-template-id="email-label"]').textContent = formTranslations[lang].emailLabel;
      document.querySelector('[data-template-id="phone-label"]').textContent = formTranslations[lang].phoneLabel;
      document.querySelector('[data-template-id="postal-label"]').textContent = formTranslations[lang].postalLabel;
      document.querySelector('[data-template-id="address-label"]').textContent = formTranslations[lang].addressLabel;
      document.querySelector('[data-template-id="allergies-label"]').textContent = formTranslations[lang].allergiesLabel;
      document.querySelector('[data-template-id="afterparty-label"]').textContent = formTranslations[lang].afterpartyLabel;
      document.querySelectorAll('[data-template-id="afterparty-yes"]').forEach(el => el.textContent = formTranslations[lang].afterpartyYes);
      document.querySelectorAll('[data-template-id="afterparty-no"]').forEach(el => el.textContent = formTranslations[lang].afterpartyNo);
      document.querySelector('[data-template-id="message-label"]').textContent = formTranslations[lang].messageLabel;
      document.querySelector('[data-template-id="submit-btn"]').textContent = formTranslations[lang].submitBtn;

      // Update form language button states
      document.querySelectorAll('#lang-form-jp, #lang-form-en, #lang-form-vi').forEach(btn => {
        btn.classList.remove('bg-[#d4844a]', 'text-white');
        btn.classList.add('bg-gray-300', 'text-[#6b4423]');
      });
      document.getElementById(`lang-form-${lang}`).classList.remove('bg-gray-300', 'text-[#6b4423]');
      document.getElementById(`lang-form-${lang}`).classList.add('bg-[#d4844a]', 'text-white');
    }

    document.getElementById('lang-form-jp').addEventListener('click', () => switchFormLanguage('jp'));
    document.getElementById('lang-form-en').addEventListener('click', () => switchFormLanguage('en'));
    document.getElementById('lang-form-vi').addEventListener('click', () => switchFormLanguage('vi'));
    
    // Initialize form with English language
    switchFormLanguage('en');
    
    // Update attendance radio button labels to show proper English phrases on load
    const attendanceYesLabel = form.querySelector('input[name="attendance"][value="Accepts with pleasure"]').nextElementSibling;
    const attendanceNoLabel = form.querySelector('input[name="attendance"][value="Declines with regret"]').nextElementSibling;
    attendanceYesLabel.textContent = 'Accepts with pleasure';
    attendanceNoLabel.textContent = 'Declines with regret';



    const form = document.getElementById('rsvp-form');
    const successMsg = document.getElementById('success-msg');
    const errorMsg = document.getElementById('error-msg');

    const handler = { onDataChanged() {} };

    (async () => {
        const r = await window.dataSdk.init(handler);
        if (r.isError) console.error('SDK init failed');
    })();

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.querySelector('[data-template-id="submit-btn"]');
        btn.disabled = true;
        btn.style.opacity = '0.6';
        errorMsg.classList.add('hidden');

        const fd = new FormData(form);
        const record = {
            attendance: fd.get('attendance') || '',
            full_name: fd.get('full_name') || '',
            email: fd.get('email') || '',
            phone: fd.get('phone') || '',
            postal_code: fd.get('postal_code') || '',
            address: fd.get('address') || '',
            allergies: fd.get('allergies') || '',
            afterparty: fd.get('afterparty') || '',
            message: fd.get('message') || ''
        };

        const result = await window.dataSdk.create(record);

        if (result.isOk) {
            form.classList.add('hidden');
            errorMsg.classList.add('hidden');
            successMsg.classList.remove('hidden');
            document.getElementById('success-text').textContent = 'Thank you! Your RSVP has been received. 💐';
            document.getElementById('celebration-message').textContent = 'We look forward to celebrating with you and seeing you at our wedding.';
        } else {
            btn.disabled = false;
            btn.style.opacity = '1';
            errorMsg.classList.remove('hidden');
        }
    });
  </script>
